    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📅 Sınav Takvimi</h1>

            <!-- İstenilen Onay Kutusu (Checkbox) -->

                <input type="checkbox" id="detayliListe">
                <label for="detayliListe">Detaylı Listeyi Göster (Öğretmen/Sınıf Bilgisi)</label>
            </div>
        </div>

        <div id="loading">Veriler yükleniyor...</div>
        
        <table id="examTable">
            <thead>
                <!-- Başlıklar JavaScript ile dinamik olarak doldurulacak -->
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
